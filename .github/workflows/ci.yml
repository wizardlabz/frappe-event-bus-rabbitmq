name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-frappe_event_bus_rabbitmq-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Server Tests
    runs-on: ubuntu-22.04

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          # A non-"guest" user is not restricted to loopback, so the runner can connect.
          RABBITMQ_DEFAULT_USER: bus_ci
          RABBITMQ_DEFAULT_PASS: bus_ci
        ports:
          - 5672:5672
        options: --health-cmd="rabbitmq-diagnostics -q ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Find tests
        run: |
          echo "Finding tests"
          grep -rn "def test" > /dev/null

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Setup bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --frappe-branch version-15 --python "$(which python)" ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install apps
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app frappe_event_bus https://github.com/wizardlabz/frappe-event-bus --branch main
          bench get-app frappe_event_bus_rabbitmq "${GITHUB_WORKSPACE}"
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin --mariadb-user-host-login-scope=% test_site
          bench --site test_site install-app frappe_event_bus
          bench --site test_site install-app frappe_event_bus_rabbitmq
          bench build
        env:
          CI: 'Yes'

      - name: Run tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app frappe_event_bus_rabbitmq
        env:
          TYPE: server
          RABBITMQ_TEST_HOST: '127.0.0.1'
          RABBITMQ_TEST_PORT: '5672'
          RABBITMQ_TEST_USER: bus_ci
          RABBITMQ_TEST_PASS: bus_ci
